<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>FraudZap - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <h1>FraudZap</h1>
                <p class="tagline">Secure Fraud Detection Platform</p>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email" 
                        required
                        autocomplete="email"
                        aria-label="Email address"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required
                        autocomplete="current-password"
                        aria-label="Password"
                    >
                </div>
                
                <div id="errorMessage" class="error-message" role="alert" aria-live="polite"></div>
                
                <button type="submit" class="login-button" id="loginButton">Login</button>
                
                <div class="forgot-password">
                    <a href="#" id="forgotPasswordLink">Forgot Password?</a>
                </div>
            </form>
            
            <div class="security-notice">
                <small>🔒 Your connection is secure. All data is encrypted.</small>
            </div>
        </div>
    </div>
    
    <!-- Forgot Password Modal -->
    <div id="forgotPasswordModal" class="modal" role="dialog" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-content">
            <span class="close" aria-label="Close modal">&times;</span>
            <h2 id="modalTitle">Reset Password</h2>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="resetEmail">Email</label>
                    <input 
                        type="email" 
                        id="resetEmail" 
                        name="resetEmail" 
                        placeholder="Enter your email" 
                        required
                        aria-label="Email for password reset"
                    >
                </div>
                <div id="resetMessage" class="success-message" role="alert" aria-live="polite"></div>
                <button type="submit" class="login-button">Send Reset Link</button>
            </form>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
